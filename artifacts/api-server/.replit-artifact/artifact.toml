kind = "api"
previewPath = "/"
title = "HORROCRUXES Backend"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "HORROCRUXES Backend"
paths = ["/"]

[services.development]
run = "cd /home/runner/workspace && uvicorn app.main:app --host 0.0.0.0 --port 8080"

[services.development.env]
PYTHONUNBUFFERED = "1"

[services.production]

[services.production.run]
args = ["sh", "-c", "cd /home/runner/workspace && uvicorn app.main:app --host 0.0.0.0 --port 8080"]

[services.production.run.env]
PYTHONUNBUFFERED = "1"

[services.production.health.startup]
path = "/health"
