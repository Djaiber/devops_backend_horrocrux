name: Deploy Backend

on:
  push:
    branches: [main]
    paths: ['app/**', 'Dockerfile', 'requirements.txt']
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPO: horrocruxes-backend-dev
  ECS_CLUSTER: horrocruxes-cluster-dev
  ECS_SERVICE: horrocruxes-backend-service-dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          docker build -t ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ github.sha }} .
          docker push ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ github.sha }}
          docker tag ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ github.sha }} \
                     ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:latest
          docker push ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:latest

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment
